<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qutation - หน้าหลัก</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .landing { max-width: 700px; margin: 80px auto; text-align: center; }
      .landing h1 { font-size: 2.4rem; margin-bottom: 8px; }
      .landing p.sub { font-size: 1.1rem; color: var(--gray); margin-bottom: 40px; }
      .system-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; }
      .system-card { border: 1px solid #d1d5db; border-radius: 12px; padding: 32px 24px; background: #fff; box-shadow: 0 4px 16px rgba(17,24,39,0.08); text-decoration: none; color: inherit; transition: box-shadow 0.2s; }
      .system-card:hover { box-shadow: 0 8px 24px rgba(17,24,39,0.16); }
      .system-card h2 { margin: 0 0 10px; font-size: 1.4rem; }
      .system-card p { color: var(--gray); margin: 0 0 20px; font-size: 0.95rem; line-height: 1.6; }
      .system-card .btn { display: inline-block; }
      @media (max-width: 600px) { .system-grid { grid-template-columns: 1fr; } .landing { margin: 40px 16px; } }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="landing">
        <h1>Qutation</h1>
        <p class="sub">เลือกระบบที่ต้องการใช้งาน</p>
        <div class="system-grid">
          <a href="quotation.html" class="system-card">
            <h2>📄 ระบบใบเสนอราคา</h2>
            <p>ทำใบเสนอราคา, จัดการลูกค้า, คำนวณส่วนลด/VAT, พิมพ์ใบเสนอราคา, ดูประวัติและรายงาน</p>
            <span class="btn btn-primary">เข้าใช้งาน →</span>
          </a>
          <a href="stock.html" class="system-card">
            <h2>📦 ระบบสต็อกสินค้า</h2>
            <p>จัดการคลังสินค้า, เพิ่มสต็อก, เบิก/หักสต็อก, ดูประวัติธุรกรรมสินค้า</p>
            <span class="btn btn-primary">เข้าใช้งาน →</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
